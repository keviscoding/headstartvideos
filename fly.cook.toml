# Fly app for ChannelRecipe cooks (ephemeral Machines started by the web API).
# Deploy image only (do NOT leave always-on VMs running):
#   fly deploy -c fly.cook.toml --build-only
# If `fly deploy` without --build-only creates an "app" machine, destroy it:
#   fly machines list -a channelrecipe-cook
#   fly machine destroy <id> -a channelrecipe-cook --force
#
# Do NOT set SPACES_* / DATABASE_URL / API keys as `fly secrets` here.
# Fly secrets override Machines API env, and stay stale when the app is
# scaled to 0. The web dyno injects fresh env into each one-shot Machine.

app = 'channelrecipe-cook'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  COOK_ON_WEB = '0'
  ALLOW_LOCAL_WHISPER = '0'
  MAX_CONCURRENT_COOKS = '1'

# No public HTTP service — Machines are started via API for each cook.
[[vm]]
  size = 'shared-cpu-2x'
  memory = '4gb'
  cpus = 2
