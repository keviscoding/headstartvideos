<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChannelRecipe — Proven recipes for faceless YouTube channels</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--canvas); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  a { color: var(--ink); text-decoration: none; transition: color var(--dur-fast); }
  a:hover { color: var(--accent); }
  h1, h2 { text-wrap: balance; }
  @keyframes cr-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes cr-line { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes cr-eq { 0%,100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel" src="../common.jsx"></script>
  <script type="text/babel" src="./Demo.jsx"></script>
  <script type="text/babel" src="./MarketingPage.jsx"></script>
  <script type="text/babel">
    const mount = () => {
      if (!window.MarketingPage) return setTimeout(mount, 30);
      ReactDOM.createRoot(document.getElementById('root')).render(<window.MarketingPage />);
    };
    mount();
  </script>
</body>
</html>
