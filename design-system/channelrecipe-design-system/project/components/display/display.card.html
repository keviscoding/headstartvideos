<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-body); }
  .wrap { display: flex; flex-direction: column; gap: 18px; padding: 24px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { PillBadge, StatusChip, CreditsChip, BrowserFrame } = window.ChannelRecipeDesignSystem_51526c;
    ReactDOM.createRoot(document.getElementById('root')).render(
      <div className="wrap">
        <div className="row">
          <PillBadge>New: this week's recipe just dropped</PillBadge>
        </div>
        <div className="row">
          <StatusChip kind="new">New</StatusChip>
          <StatusChip kind="proven">Proven</StatusChip>
          <StatusChip kind="monetized">Monetized</StatusChip>
          <StatusChip kind="warn">Queued</StatusChip>
          <StatusChip kind="error">Failed</StatusChip>
          <StatusChip kind="neutral">Draft</StatusChip>
        </div>
        <div className="row">
          <CreditsChip credits={11} resets="Jul 14" />
          <CreditsChip credits={2} compact />
        </div>
        <BrowserFrame url="app.channelrecipe.com">
          <div style={{padding:'28px 24px', color:'var(--app-text-body)', fontFamily:'var(--font-body)'}}>
            <div style={{fontFamily:'var(--font-display)', fontWeight:800, fontSize:22, color:'var(--app-text-strong)', letterSpacing:'-.01em'}}>Cooking your video…</div>
            <div style={{fontFamily:'var(--font-mono)', fontSize:12, color:'var(--app-text-muted)', marginTop:8}}>rendering · about 3 minutes</div>
          </div>
        </BrowserFrame>
      </div>
    );
  </script>
</body>
</html>
