<!-- @dsCard group="Type" viewport="700x230" name="Mono — receipts" subtitle="JetBrains Mono for numbers-as-proof: cook time, credits, views, RPM" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-mono);color:var(--ink)}
  .wrap{padding:26px;display:flex;flex-direction:column;gap:20px}
  .stats{display:flex;gap:40px;flex-wrap:wrap}
  .stat .n{font-size:34px;font-weight:600;letter-spacing:.01em}
  .stat .l{font-family:var(--font-body);font-size:13px;color:var(--ink-3);margin-top:2px}
  .meta{font-size:13px;color:var(--ink-3);letter-spacing:.01em}
</style></head>
<body>
  <div class="wrap">
    <div class="stats">
      <div class="stat"><div class="n">142,900</div><div class="l">views · 30 days</div></div>
      <div class="stat"><div class="n">$5.80</div><div class="l">RPM</div></div>
      <div class="stat"><div class="n">~15 min</div><div class="l">cook time</div></div>
      <div class="stat"><div class="n">11</div><div class="l">credits left</div></div>
    </div>
    <div class="meta">cook time ~15 min · 1 credit · RPM $4–8 · resets Jul 14</div>
  </div>
</body></html>
