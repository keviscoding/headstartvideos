<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — cream & ink" subtitle="Inherited cream canvas + near-black ink text scale" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body)}
  .row{display:flex;gap:0;padding:22px}
  .sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--hairline)}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
  .n{font-family:var(--font-mono);font-size:11px}
  .h{font-family:var(--font-mono);font-size:11px;opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--canvas);color:var(--ink)"><span class="n">canvas</span><span class="h">#F7F5F0</span></div>
    <div class="sw" style="background:var(--canvas-2);color:var(--ink)"><span class="n">canvas-2</span><span class="h">#F1EEE6</span></div>
    <div class="sw" style="background:var(--ink);color:#fff"><span class="n">ink</span><span class="h">#16161A</span></div>
    <div class="sw" style="background:var(--ink-2);color:#fff"><span class="n">ink-2</span><span class="h">#45454E</span></div>
    <div class="sw" style="background:var(--ink-3);color:#fff"><span class="n">ink-3</span><span class="h">#6E6E79</span></div>
  </div>
</body></html>
