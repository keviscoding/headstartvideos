<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body)}
  .row{display:flex;gap:0;padding:22px}
  .sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
  .n{font-family:var(--font-mono);font-size:11px;letter-spacing:.02em}
  .h{font-family:var(--font-mono);font-size:11px;opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--accent);color:#fff"><span class="n">accent</span><span class="h">#6D5AE0</span></div>
    <div class="sw" style="background:var(--accent-hover);color:#fff"><span class="n">accent-hover</span><span class="h">#5A48C9</span></div>
    <div class="sw" style="background:var(--accent-press);color:#fff"><span class="n">accent-press</span><span class="h">#4C3BB0</span></div>
    <div class="sw" style="background:var(--accent-soft);color:var(--accent)"><span class="n">accent-soft</span><span class="h">#EDEAFB</span></div>
  </div>
</body></html>
