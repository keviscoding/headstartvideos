<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4px base grid · generous whitespace" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-mono)}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:14px}
  .bar{height:16px;background:var(--accent);border-radius:3px}
  .lbl{font-size:11px;color:var(--ink-3);width:120px}
</style></head>
<body>
  <div class="wrap">
    <div class="row"><span class="lbl">space-1 · 4</span><span class="bar" style="width:4px"></span></div>
    <div class="row"><span class="lbl">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
    <div class="row"><span class="lbl">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
    <div class="row"><span class="lbl">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
    <div class="row"><span class="lbl">space-5 · 24</span><span class="bar" style="width:24px"></span></div>
    <div class="row"><span class="lbl">space-6 · 32</span><span class="bar" style="width:32px"></span></div>
    <div class="row"><span class="lbl">space-7 · 48</span><span class="bar" style="width:48px"></span></div>
    <div class="row"><span class="lbl">space-8 · 64</span><span class="bar" style="width:64px"></span></div>
    <div class="row"><span class="lbl">space-9 · 96</span><span class="bar" style="width:96px"></span></div>
  </div>
</body></html>
