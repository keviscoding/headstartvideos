<!-- @dsCard group="Type" viewport="700x300" name="Display — Cabinet Grotesk" subtitle="Heavy grotesque, tight leading, sentence case, one violet word" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-display);color:var(--ink)}
  .wrap{padding:26px;display:flex;flex-direction:column;gap:14px}
  .line{display:flex;align-items:baseline;gap:16px}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);width:120px;flex:none}
  .d1{font-size:56px;line-height:1.02;font-weight:800;letter-spacing:-.02em}
  .d2{font-size:40px;line-height:1.08;font-weight:800;letter-spacing:-.02em}
  .d3{font-size:30px;line-height:1.12;font-weight:700;letter-spacing:-.01em}
  em{font-style:normal;color:var(--accent)}
</style></head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">display-l · 800</span><span class="d1">Pick a recipe. We handle the <em>cooking</em>.</span></div>
    <div class="line"><span class="tag">display-m · 800</span><span class="d2">A finished video in <em>15 minutes</em></span></div>
    <div class="line"><span class="tag">display-s · 700</span><span class="d3">Proven recipes, every week</span></div>
  </div>
</body></html>
